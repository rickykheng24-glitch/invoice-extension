<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Invoice Generator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h1>Quick Invoice</h1>
  </div>

  <div class="container">

    <!-- From / To -->
    <div class="two-col">
      <div class="section">
        <div class="section-title">From</div>
        <input type="text" id="from-name" placeholder="Your Name / Business">
        <input type="text" id="from-email" placeholder="Email">
        <input type="text" id="from-address" placeholder="Address / Phone">
      </div>
      <div class="section">
        <div class="section-title">Bill To</div>
        <input type="text" id="to-name" placeholder="Client Name">
        <input type="text" id="to-email" placeholder="Client Email">
        <input type="text" id="to-address" placeholder="Client Address">
      </div>
    </div>

    <!-- Invoice Meta -->
    <div class="three-col section">
      <div class="field">
        <label>Invoice #</label>
        <input type="text" id="invoice-number" value="INV-001">
      </div>
      <div class="field">
        <label>Date</label>
        <input type="date" id="invoice-date">
      </div>
      <div class="field">
        <label>Due Date</label>
        <input type="date" id="due-date">
      </div>
    </div>

    <!-- Items -->
    <div class="section">
      <div class="section-title">Items</div>
      <div class="items-header">
        <span class="col-desc">Description</span>
        <span class="col-qty">Qty</span>
        <span class="col-rate">Rate ($)</span>
        <span class="col-amount">Amount</span>
        <span class="col-del"></span>
      </div>
      <div id="items-container"></div>
      <button id="add-item" class="btn-add">+ Add Item</button>
    </div>

    <!-- Tax & Totals -->
    <div class="totals-row">
      <div class="tax-field">
        <label>Tax (%)</label>
        <input type="number" id="tax-rate" value="0" min="0" max="100" step="0.1">
      </div>
      <div class="totals-box">
        <div class="total-line">
          <span>Subtotal</span>
          <strong id="subtotal">$0.00</strong>
        </div>
        <div class="total-line">
          <span id="tax-label">Tax (0%)</span>
          <strong id="tax-amount">$0.00</strong>
        </div>
        <div class="total-line grand">
          <span>Total</span>
          <strong id="total">$0.00</strong>
        </div>
      </div>
    </div>

    <!-- Notes -->
    <div class="section">
      <div class="section-title">Notes</div>
      <textarea id="notes" placeholder="Payment instructions, bank details, thank you note..."></textarea>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button id="clear-btn" class="btn-secondary">Clear</button>
      <button id="generate-pdf" class="btn-primary">Generate PDF</button>
    </div>

  </div>

  <script src="lib/jspdf.umd.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
